<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eytan&#39;s public docs</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #eef1f5;
      --text: #17191f;
      --muted: #667085;
      --line: #d7dce3;
      --blue: #2b74c8;
      --green: #247b5a;
      --orange: #a85c18;
      --shadow: 0 12px 34px rgba(28, 36, 48, 0.10);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(43, 116, 200, 0.08), transparent 260px),
        var(--bg);
    }

    a {
      color: inherit;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 20px 44px;
    }

    .masthead {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 56px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .summary {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .metric {
      min-width: 96px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      text-align: right;
    }

    .metric strong {
      display: block;
      font-size: 18px;
      line-height: 1.1;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 12px 0;
      background: rgba(246, 247, 249, 0.88);
      backdrop-filter: blur(14px);
    }

    .search {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 1px 0 rgba(17, 24, 39, 0.03);
    }

    .search svg {
      color: var(--muted);
    }

    .search input {
      border: 0;
      outline: 0;
      min-width: 0;
      color: var(--text);
      background: transparent;
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .filter {
      min-width: 82px;
      height: 34px;
      padding: 0 12px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .filter[aria-pressed="true"] {
      color: var(--text);
      background: var(--surface-2);
    }

    .results-line {
      min-height: 22px;
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: 190px minmax(0, auto);
    }

    .preview {
      position: relative;
      background:
        linear-gradient(135deg, rgba(36, 123, 90, 0.14), transparent 46%),
        linear-gradient(315deg, rgba(168, 92, 24, 0.12), transparent 42%),
        #f8fafc;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }

    .preview iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
      transform: scale(0.72);
      transform-origin: top left;
      width: 138.888%;
      height: 138.888%;
      pointer-events: none;
    }

    .markdown-preview {
      height: 100%;
      padding: 18px;
      overflow: hidden;
      color: #263241;
    }

    .markdown-preview .doc-line {
      width: 58px;
      height: 4px;
      margin-bottom: 14px;
      border-radius: 999px;
      background: var(--green);
    }

    .markdown-preview p {
      margin: 0;
      font-size: 14px;
      line-height: 1.48;
    }

    .body {
      min-width: 0;
      padding: 15px;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .type {
      color: #fff;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .type.html {
      background: var(--blue);
    }

    .type.markdown {
      background: var(--green);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .path {
      margin: 0 0 13px;
      color: var(--muted);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .action-links {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .open-link,
    .pdf-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 7px;
      background: #17191f;
      color: #fff;
      text-decoration: none;
      font-weight: 650;
      font-size: 14px;
    }

    .pdf-link {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
    }

    .open-link:hover,
    .open-link:focus-visible {
      background: #2b74c8;
      outline: none;
    }

    .pdf-link:hover,
    .pdf-link:focus-visible {
      border-color: #2b74c8;
      color: #2b74c8;
      outline: none;
    }

    .folder {
      min-width: 0;
      color: var(--orange);
      font-size: 12px;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      display: none;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 36px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      text-align: center;
    }

    .empty.is-visible {
      display: block;
    }

    @media (max-width: 760px) {
      .shell {
        padding: 20px 14px 34px;
      }

      .masthead,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .summary {
        justify-content: stretch;
      }

      .metric {
        flex: 1 1 0;
        text-align: left;
      }

      .filters {
        justify-content: stretch;
      }

      .filter {
        flex: 1;
        min-width: 0;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    <p class="results-line" id="resultsLine"></p>
    <section class="grid" id="grid" aria-live="polite"></section>
    <section class="empty" id="empty">No matching files.</section>
  </main>

  <script>
    const records = JSON.parse(document.getElementById("index-data").textContent);
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    const searchInput = document.getElementById("search");
    const resultsLine = document.getElementById("resultsLine");
    const filterButtons = Array.from(document.querySelectorAll(".filter"));
    let activeFilter = "all";

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function icon() {
      return '<svg aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7"></path><path d="M8 7h9v9"></path></svg>';
    }

    function downloadIcon() {
      return '<svg aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>';
    }

    function card(record) {
      const preview = record.type === "html"
        ? '<iframe src="' + record.href + '" title="Preview of ' + escapeHtml(record.title) + '" loading="lazy"></iframe>'
        : '<div class="markdown-preview"><div class="doc-line"></div><p>' + escapeHtml(record.excerpt || "Markdown document") + '</p></div>';
      const pdfAction = record.pdfHref
        ? '<a class="pdf-link" href="' + record.pdfHref + '" download>' + downloadIcon() + '<span>PDF</span></a>'
        : '';

      return '<article class="card">' +
        '<div class="preview">' + preview + '</div>' +
        '<div class="body">' +
          '<div class="meta"><span class="type ' + record.type + '">' + (record.type === "html" ? "HTML" : "MD") + '</span><span>Updated ' + escapeHtml(record.updated) + '</span></div>' +
          '<h2>' + escapeHtml(record.title) + '</h2>' +
          '<p class="path">' + escapeHtml(record.path) + '</p>' +
          '<div class="actions">' +
            '<div class="action-links">' +
              '<a class="open-link" href="' + record.href + '">' + icon() + '<span>Open</span></a>' +
              pdfAction +
            '</div>' +
            '<span class="folder" title="' + escapeHtml(record.folder) + '">' + escapeHtml(record.folder) + '</span>' +
          '</div>' +
        '</div>' +
      '</article>';
    }

    function matches(record, query) {
      if (activeFilter !== "all" && record.type !== activeFilter) return false;
      if (!query) return true;
      return query.split(/\s+/).every((part) => record.searchText.includes(part));
    }

    function render() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = records.filter((record) => matches(record, query));
      grid.innerHTML = filtered.map(card).join("");
      empty.classList.toggle("is-visible", filtered.length === 0);
      const typeLabel = activeFilter === "all" ? "files" : activeFilter === "html" ? "HTML files" : "Markdown files";
      resultsLine.textContent = filtered.length + " of " + records.length + " " + typeLabel;
    }

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        filterButtons.forEach((item) => item.setAttribute("aria-pressed", String(item === button)));
        render();
      });
    });

    searchInput.addEventListener("input", render);
    render();
  </script>
